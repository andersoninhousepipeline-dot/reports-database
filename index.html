<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advat Report Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --bg-card: #161f2e;
            --accent-primary: #06b6d4;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d3a4f;
            --gradient-1: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            --shadow-glow: 0 0 40px rgba(6, 182, 212, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .bg-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
        }

        .container {
            max-width: 1700px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 56px; height: 56px;
            background: var(--gradient-1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            box-shadow: var(--shadow-glow);
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            animation: pulse 2s infinite;
        }
        .sync-dot.loading { background: var(--accent-warning); }
        .sync-dot.error { background: var(--accent-danger); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-icon:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
        }

        .stat-card.total::before { background: var(--gradient-1); }
        .stat-card.runs::before { background: var(--accent-secondary); }
        .stat-card.tests::before { background: var(--accent-success); }
        .stat-card.released::before { background: var(--accent-warning); }
        .stat-card.filtered::before { background: #ec4899; }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-card.total .stat-value { color: var(--accent-primary); }
        .stat-card.runs .stat-value { color: var(--accent-secondary); }
        .stat-card.tests .stat-value { color: var(--accent-success); }
        .stat-card.released .stat-value { color: var(--accent-warning); }
        .stat-card.filtered .stat-value { color: #ec4899; }

        .sheet-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .sheet-tab {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .sheet-tab:hover { border-color: var(--accent-primary); color: var(--text-primary); }
        .sheet-tab.active { background: var(--gradient-1); border-color: transparent; color: white; }

        .filters-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .filters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filters-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-filters {
            background: transparent;
            border: none;
            color: var(--accent-primary);
            font-size: 13px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .clear-filters:hover { background: rgba(6, 182, 212, 0.1); }

        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .search-bar {
            position: relative;
            flex: 1;
            min-width: 280px;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }

        .search-bar input::placeholder { color: var(--text-muted); }

        .search-bar svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            min-height: 10px;
        }

        .active-filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-primary);
        }

        .active-filter-tag .label {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
        }

        .active-filter-tag .remove {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            font-size: 14px;
        }

        .active-filter-tag .remove:hover { opacity: 1; }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group > label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-group > label .count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--accent-primary);
        }

        .multi-select { position: relative; }

        .multi-select-trigger {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }

        .multi-select-trigger:hover { border-color: var(--accent-primary); }
        .multi-select-trigger .placeholder { color: var(--text-muted); }

        .multi-select-trigger .selected-count {
            background: var(--accent-primary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .multi-select-dropdown {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 4px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .multi-select-dropdown.open { display: block; }

        .multi-select-search {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
        }

        .multi-select-search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
        }

        .multi-select-search input:focus { outline: none; border-color: var(--accent-primary); }

        .multi-select-options { padding: 8px; }

        .multi-select-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 13px;
        }

        .multi-select-option:hover { background: var(--bg-tertiary); }

        .multi-select-option input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        .multi-select-option .option-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .multi-select-option .option-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .multi-select-actions {
            padding: 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            position: sticky;
            bottom: 0;
            background: var(--bg-secondary);
        }

        .multi-select-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .btn-select-all {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-select-all:hover { background: var(--bg-tertiary); }

        .btn-clear-filter {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-danger);
        }

        .btn-clear-filter:hover { background: rgba(239, 68, 68, 0.25); }

        .table-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .table-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .table-info {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 60vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        thead th {
            background: var(--bg-tertiary);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
        }

        thead th:hover { background: var(--bg-secondary); }

        thead th .sort-icon {
            margin-left: 6px;
            opacity: 0.5;
        }

        thead th.sorted .sort-icon { opacity: 1; color: var(--accent-primary); }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.15s;
        }

        tbody tr:hover { background: rgba(6, 182, 212, 0.05); }

        tbody td {
            padding: 12px 16px;
            color: var(--text-primary);
            vertical-align: middle;
        }

        .cell-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        .cell-sample {
            font-weight: 500;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cell-run {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-secondary);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .cell-test {
            padding: 4px 10px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            display: inline-block;
        }

        .cell-category {
            padding: 4px 10px;
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-primary);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            display: inline-block;
        }

        .cell-type { color: var(--text-secondary); font-size: 12px; }

        .cell-actions { display: flex; gap: 8px; }

        .btn-view, .btn-download {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-view { background: rgba(6, 182, 212, 0.15); color: var(--accent-primary); }
        .btn-view:hover { background: rgba(6, 182, 212, 0.25); }

        .btn-download { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .btn-download:hover { background: rgba(16, 185, 129, 0.25); }

        .no-link { color: var(--text-muted); font-size: 12px; font-style: italic; }

        .remarks-cell {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            color: var(--text-muted);
            cursor: help;
        }

        .empty-state, .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 18px; color: var(--text-secondary); margin-bottom: 8px; }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-title { font-size: 16px; font-weight: 600; }

        .modal-close {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .modal-body iframe {
            width: 100%;
            height: 70vh;
            border: none;
        }

        .config-content {
            max-width: 650px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .config-content h2 { margin-bottom: 8px; font-size: 20px; }
        .config-content .subtitle { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }

        .config-field { margin-bottom: 16px; }
        .config-field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }

        .config-field input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .config-field input:focus { outline: none; border-color: var(--accent-primary); }

        .config-actions { display: flex; gap: 12px; margin-top: 24px; }

        .btn-primary {
            flex: 1;
            padding: 12px 24px;
            background: var(--gradient-1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-secondary:hover { background: var(--bg-tertiary); }

        .btn-export {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--accent-secondary);
        }

        .btn-export:hover { background: rgba(139, 92, 246, 0.25); }

        .tooltip {
            position: fixed;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 300px;
            z-index: 1001;
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .filters-grid { grid-template-columns: 1fr; }
            .table-wrapper { max-height: 50vh; }
            .search-bar { min-width: 100%; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <header class="header">
            <div class="logo-section">
                <div class="logo-icon">AR</div>
                <div class="logo-text">
                    <h1>Advat Report Database</h1>
                    <p>SURFseq Analysis Reports</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="sync-status">
                    <span class="sync-dot" id="syncDot"></span>
                    <span id="syncText">Ready</span>
                </div>
                <button class="btn-icon" onclick="loadData()" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Refresh
                </button>
                <button class="btn-icon" onclick="openConfig()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                    Settings
                </button>
            </div>
        </header>

        <div class="sheet-tabs" id="sheetTabs"></div>

        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-label">Total Samples</div>
                <div class="stat-value" id="totalSamples">0</div>
                <div class="stat-sub" id="totalSamplesSub"></div>
            </div>
            <div class="stat-card runs">
                <div class="stat-label">Runs</div>
                <div class="stat-value" id="totalRuns">0</div>
                <div class="stat-sub" id="totalRunsSub"></div>
            </div>
            <div class="stat-card tests">
                <div class="stat-label">Test Types</div>
                <div class="stat-value" id="totalTests">0</div>
                <div class="stat-sub" id="totalTestsSub"></div>
            </div>
            <div class="stat-card released">
                <div class="stat-label">With Reports</div>
                <div class="stat-value" id="withReports">0</div>
                <div class="stat-sub" id="withReportsSub"></div>
            </div>
            <div class="stat-card filtered">
                <div class="stat-label">Showing</div>
                <div class="stat-value" id="filteredCount">0</div>
                <div class="stat-sub" id="filteredSub"></div>
            </div>
        </div>

        <div class="filters-section">
            <div class="filters-header">
                <div class="filters-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                    </svg>
                    Advanced Filters
                </div>
                <button class="clear-filters" onclick="clearAllFilters()">Clear All Filters</button>
            </div>
            
            <div class="search-row">
                <div class="search-bar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search sample name, ID, category, remarks...">
                </div>
            </div>

            <div class="active-filters" id="activeFilters"></div>
            <div class="filters-grid" id="filtersGrid"></div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <div class="table-title">Sample Records</div>
                <div class="table-actions">
                    <button class="btn-icon btn-export" onclick="exportData()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                        </svg>
                        Export CSV
                    </button>
                    <div class="table-info">
                        <span id="showingCount">0</span> of <span id="totalCount">0</span>
                    </div>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr id="tableHead"></tr></thead>
                    <tbody id="tableBody">
                        <tr><td colspan="11">
                            <div class="loading-state">
                                <div class="spinner"></div>
                                <span>Loading data...</span>
                            </div>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pdfModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Report Preview</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <iframe id="pdfFrame" src=""></iframe>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="configModal">
        <div class="modal-content config-content">
            <h2>⚙️ Data Source Configuration</h2>
            <p class="subtitle">Enter your Google Apps Script Web App URL below.</p>
            <div class="config-field">
                <label>Apps Script Web App URL</label>
                <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
            </div>
            <div class="config-actions">
                <button class="btn-secondary" onclick="closeConfig()">Cancel</button>
                <button class="btn-primary" onclick="saveConfig()">Save & Reload</button>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip" style="display: none;"></div>

    <script>
        // CONFIG
        let config = {
            apiUrl: 'https://script.google.com/macros/s/AKfycbyfjXqMZNbpLLchWujMJ2CGY1bHEx1Hq_JevEqQ5yOzsweoTR4E1sL-RoW9voIZIcou/exec',
            currentSheet: 'all'
        };

        const FILTER_COLUMNS = [
            { key: 'run', label: 'Run' },
            { key: 'test', label: 'Test' },
            { key: 'single_couple', label: 'Single/Couple' },
            { key: 'category', label: 'Category' },
            { key: 'sample_type', label: 'Sample Type' }
        ];

        const TABLE_COLUMNS = [
            { key: 'no', label: 'No', sortable: true },
            { key: 'sample_name', label: 'Sample Name', sortable: true },
            { key: 'gen_id', label: 'Gen ID', sortable: true },
            { key: 'anderson_id', label: 'Anderson ID', sortable: true },
            { key: 'test', label: 'Test', sortable: true },
            { key: 'single_couple', label: 'Single/Couple', sortable: true },
            { key: 'category', label: 'Category', sortable: true },
            { key: 'sample_type', label: 'Sample Type', sortable: true },
            { key: 'remarks', label: 'Remarks', sortable: false },
            { key: 'run', label: 'Run', sortable: true },
            { key: 'actions', label: 'Actions', sortable: false }
        ];

        // STATE
        let allData = [];
        let filteredData = [];
        let sheetNames = [];
        let filters = {};
        let sortColumn = null;
        let sortDirection = 'asc';

        const savedConfig = localStorage.getItem('advatConfigV2');
        if (savedConfig) try { config = { ...config, ...JSON.parse(savedConfig) }; } catch(e) {}

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            FILTER_COLUMNS.forEach(c => filters[c.key] = new Set());
            renderTableHead();
            loadData();
            setupEventListeners();
        });

        // DATA LOADING
        async function loadData() {
            const syncDot = document.getElementById('syncDot');
            const syncText = document.getElementById('syncText');
            syncDot.className = 'sync-dot loading';
            syncText.textContent = 'Loading...';

            if (!config.apiUrl) {
                showError('No API URL configured. Click Settings.');
                return;
            }

            try {
                const response = await fetch(config.apiUrl);
                const json = await response.json();
                console.log('API Response:', json);

                if (!json.success) throw new Error(json.error || 'API error');

                parseJSONData(json);
                syncDot.className = 'sync-dot';
                syncText.textContent = 'Synced ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Load error:', error);
                showError('Failed: ' + error.message);
            }
        }

        function parseJSONData(json) {
            sheetNames = Object.keys(json.sheets || {});
            renderSheetTabs();

            allData = (json.data || []).map(row => ({
                no: row.no || row['no.'] || '',
                sample_name: row.sample_name || row['sample_name'] || '',
                gen_id: row.gen_id || row['gen_id'] || '',
                anderson_id: row.anderson_id || row['anderson_id'] || '',
                test: row.test || '',
                single_couple: row['single/couple'] || row.single_couple || row.singlecouple || '',
                category: row.category || '',
                sample_type: row.sample_type || row['sample_type'] || '',
                remarks: row.remarks || '',
                report_link: row._report_link || row.report_link || '',
                run: row._run || row.run || '',
                sheet: row._sheet || ''
            })).filter(r => r.sample_name && r.sample_name.trim());

            console.log('Parsed:', allData.length, 'records');
            console.log('With reports:', allData.filter(r => r.report_link).length);

            renderFilters();
            applyFilters();
        }

        function showError(msg) {
            document.getElementById('syncDot').className = 'sync-dot error';
            document.getElementById('syncText').textContent = 'Error';
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="11"><div class="empty-state"><h3>${msg}</h3></div></td></tr>`;
        }

        // SHEET TABS
        function renderSheetTabs() {
            const container = document.getElementById('sheetTabs');
            if (sheetNames.length <= 1) { container.innerHTML = ''; return; }
            const tabs = ['all', ...sheetNames];
            container.innerHTML = tabs.map(name => 
                `<button class="sheet-tab ${config.currentSheet === name ? 'active' : ''}" onclick="switchSheet('${name}')">${name === 'all' ? 'All Sheets' : name}</button>`
            ).join('');
        }

        function switchSheet(name) {
            config.currentSheet = name;
            localStorage.setItem('advatConfigV2', JSON.stringify(config));
            renderSheetTabs();
            applyFilters();
        }

        // FILTERS
        function renderFilters() {
            document.getElementById('filtersGrid').innerHTML = FILTER_COLUMNS.map(col => {
                const values = [...new Set(allData.map(d => d[col.key]).filter(Boolean))].sort();
                const counts = {};
                values.forEach(v => counts[v] = allData.filter(d => d[col.key] === v).length);

                return `
                    <div class="filter-group">
                        <label>${col.label} <span class="count">${values.length}</span></label>
                        <div class="multi-select" data-key="${col.key}">
                            <button class="multi-select-trigger" onclick="toggleDropdown('${col.key}')">
                                <span class="trigger-text">${filters[col.key].size > 0 ? `<span class="selected-count">${filters[col.key].size}</span> selected` : `<span class="placeholder">All</span>`}</span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                            <div class="multi-select-dropdown" id="dropdown-${col.key}">
                                <div class="multi-select-search">
                                    <input type="text" placeholder="Search..." onkeyup="filterOptions('${col.key}', this.value)">
                                </div>
                                <div class="multi-select-options" id="options-${col.key}">
                                    ${values.map(v => `
                                        <label class="multi-select-option" data-value="${esc(v)}">
                                            <input type="checkbox" ${filters[col.key].has(v) ? 'checked' : ''} onchange="toggleVal('${col.key}', '${esc(v)}', this.checked)">
                                            <span class="option-label">${esc(v)}</span>
                                            <span class="option-count">${counts[v]}</span>
                                        </label>
                                    `).join('')}
                                </div>
                                <div class="multi-select-actions">
                                    <button class="btn-select-all" onclick="selectAll('${col.key}')">Select All</button>
                                    <button class="btn-clear-filter" onclick="clearFilter('${col.key}')">Clear</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleDropdown(key) {
            const dd = document.getElementById(`dropdown-${key}`);
            const wasOpen = dd.classList.contains('open');
            document.querySelectorAll('.multi-select-dropdown').forEach(d => d.classList.remove('open'));
            if (!wasOpen) { dd.classList.add('open'); dd.querySelector('input').focus(); }
        }

        function filterOptions(key, term) {
            document.querySelectorAll(`#options-${key} .multi-select-option`).forEach(opt => {
                opt.style.display = opt.dataset.value.toLowerCase().includes(term.toLowerCase()) ? 'flex' : 'none';
            });
        }

        function toggleVal(key, val, checked) {
            checked ? filters[key].add(val) : filters[key].delete(val);
            updateFilterUI(key);
            applyFilters();
        }

        function selectAll(key) {
            document.querySelectorAll(`#options-${key} .multi-select-option`).forEach(opt => {
                if (opt.style.display !== 'none') {
                    filters[key].add(opt.dataset.value);
                    opt.querySelector('input').checked = true;
                }
            });
            updateFilterUI(key);
            applyFilters();
        }

        function clearFilter(key) {
            filters[key].clear();
            document.querySelectorAll(`#options-${key} input[type="checkbox"]`).forEach(cb => cb.checked = false);
            updateFilterUI(key);
            applyFilters();
        }

        function updateFilterUI(key) {
            const trigger = document.querySelector(`[data-key="${key}"] .trigger-text`);
            trigger.innerHTML = filters[key].size > 0 ? `<span class="selected-count">${filters[key].size}</span> selected` : `<span class="placeholder">All</span>`;
            renderActiveTags();
        }

        function renderActiveTags() {
            const tags = [];
            FILTER_COLUMNS.forEach(col => {
                filters[col.key].forEach(v => {
                    tags.push(`<span class="active-filter-tag"><span class="label">${col.label}:</span> ${esc(v)} <span class="remove" onclick="removeVal('${col.key}', '${esc(v)}')">&times;</span></span>`);
                });
            });
            document.getElementById('activeFilters').innerHTML = tags.join('');
        }

        function removeVal(key, val) {
            filters[key].delete(val);
            const cb = document.querySelector(`#options-${key} .multi-select-option[data-value="${val}"] input`);
            if (cb) cb.checked = false;
            updateFilterUI(key);
            applyFilters();
        }

        function clearAllFilters() {
            document.getElementById('searchInput').value = '';
            FILTER_COLUMNS.forEach(col => {
                filters[col.key].clear();
                document.querySelectorAll(`#options-${col.key} input[type="checkbox"]`).forEach(cb => cb.checked = false);
                updateFilterUI(col.key);
            });
            applyFilters();
        }

        // APPLY FILTERS & UPDATE STATS
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();

            filteredData = allData.filter(row => {
                if (config.currentSheet !== 'all' && row.sheet !== config.currentSheet) return false;
                if (search && !Object.values(row).join(' ').toLowerCase().includes(search)) return false;
                for (const col of FILTER_COLUMNS) {
                    if (filters[col.key].size > 0 && !filters[col.key].has(row[col.key])) return false;
                }
                return true;
            });

            if (sortColumn) {
                filteredData.sort((a, b) => {
                    let va = a[sortColumn] || '', vb = b[sortColumn] || '';
                    if (!isNaN(va) && !isNaN(vb)) { va = parseFloat(va); vb = parseFloat(vb); }
                    if (va < vb) return sortDirection === 'asc' ? -1 : 1;
                    if (va > vb) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            updateStats();
            renderTable();
        }

        function updateStats() {
            const isFiltered = filteredData.length !== allData.length;
            
            // Calculate filtered stats
            const filteredRuns = [...new Set(filteredData.map(d => d.run).filter(Boolean))].length;
            const filteredTests = [...new Set(filteredData.map(d => d.test).filter(Boolean))].length;
            const filteredReports = filteredData.filter(d => d.report_link).length;

            // Calculate total stats
            const totalRuns = [...new Set(allData.map(d => d.run).filter(Boolean))].length;
            const totalTests = [...new Set(allData.map(d => d.test).filter(Boolean))].length;
            const totalReports = allData.filter(d => d.report_link).length;

            // Update display - show filtered/total when filtering
            document.getElementById('totalSamples').textContent = filteredData.length;
            document.getElementById('totalSamplesSub').textContent = isFiltered ? `of ${allData.length} total` : '';

            document.getElementById('totalRuns').textContent = filteredRuns;
            document.getElementById('totalRunsSub').textContent = isFiltered ? `of ${totalRuns} total` : '';

            document.getElementById('totalTests').textContent = filteredTests;
            document.getElementById('totalTestsSub').textContent = isFiltered ? `of ${totalTests} total` : '';

            document.getElementById('withReports').textContent = filteredReports;
            document.getElementById('withReportsSub').textContent = isFiltered ? `of ${totalReports} total` : '';

            document.getElementById('filteredCount').textContent = filteredData.length;
            document.getElementById('filteredSub').textContent = isFiltered ? 'filtered' : 'all records';
        }

        function sortBy(col) {
            if (sortColumn === col) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            else { sortColumn = col; sortDirection = 'asc'; }
            document.querySelectorAll('thead th').forEach(th => { 
                th.classList.remove('sorted'); 
                const i = th.querySelector('.sort-icon'); 
                if(i) i.textContent = '↕'; 
            });
            const th = document.querySelector(`thead th[data-col="${col}"]`);
            if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = sortDirection === 'asc' ? '↑' : '↓'; }
            applyFilters();
        }

        // TABLE
        function renderTableHead() {
            document.getElementById('tableHead').innerHTML = TABLE_COLUMNS.map(c => 
                `<th data-col="${c.key}" ${c.sortable ? `onclick="sortBy('${c.key}')"` : ''}>${c.label}${c.sortable ? ' <span class="sort-icon">↕</span>' : ''}</th>`
            ).join('');
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><h3>No results</h3><p>Adjust filters or search</p></div></td></tr>`;
                document.getElementById('showingCount').textContent = '0';
                document.getElementById('totalCount').textContent = allData.length;
                return;
            }

            tbody.innerHTML = filteredData.map(r => `
                <tr>
                    <td class="cell-id">${esc(r.no)}</td>
                    <td class="cell-sample" title="${esc(r.sample_name)}">${esc(r.sample_name)}</td>
                    <td class="cell-id">${esc(r.gen_id)}</td>
                    <td class="cell-id">${esc(r.anderson_id)}</td>
                    <td>${r.test ? `<span class="cell-test">${esc(r.test)}</span>` : '-'}</td>
                    <td>${esc(r.single_couple) || '-'}</td>
                    <td>${r.category ? `<span class="cell-category">${esc(r.category)}</span>` : '-'}</td>
                    <td class="cell-type">${esc(r.sample_type) || '-'}</td>
                    <td class="remarks-cell" onmouseenter="showTip(event,'${esc(r.remarks)}')" onmouseleave="hideTip()">${esc(r.remarks) || '-'}</td>
                    <td>${r.run ? `<span class="cell-run">${esc(r.run)}</span>` : '-'}</td>
                    <td class="cell-actions">
                        ${r.report_link ? `
                            <button class="btn-view" onclick="viewPDF('${esc(r.report_link)}','${esc(r.sample_name)}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                View
                            </button>
                            <a class="btn-download" href="${getDownload(r.report_link)}" target="_blank">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                PDF
                            </a>
                        ` : '<span class="no-link">No report</span>'}
                    </td>
                </tr>
            `).join('');

            document.getElementById('showingCount').textContent = filteredData.length;
            document.getElementById('totalCount').textContent = allData.length;
        }

        // PDF
        function getDownload(url) {
            const m = url.match(/\/d\/([^\/]+)/);
            return m ? `https://drive.google.com/uc?export=download&id=${m[1]}` : url;
        }

        function getPreview(url) {
            const m = url.match(/\/d\/([^\/]+)/);
            return m ? `https://drive.google.com/file/d/${m[1]}/preview` : url;
        }

        function viewPDF(url, title) {
            document.getElementById('modalTitle').textContent = `Report: ${title}`;
            document.getElementById('pdfFrame').src = getPreview(url);
            document.getElementById('pdfModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('pdfModal').classList.remove('active');
            document.getElementById('pdfFrame').src = '';
        }

        // EXPORT
        function exportData() {
            const headers = ['No','Sample Name','Gen ID','Anderson ID','Test','Single/Couple','Category','Sample Type','Remarks','Run','Report Link'];
            const rows = filteredData.map(r => [r.no, r.sample_name, r.gen_id, r.anderson_id, r.test, r.single_couple, r.category, r.sample_type, r.remarks, r.run, r.report_link]);
            const csv = [headers, ...rows].map(r => r.map(c => `"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `advat_export_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        // CONFIG
        function openConfig() {
            document.getElementById('apiUrlInput').value = config.apiUrl;
            document.getElementById('configModal').classList.add('active');
        }

        function closeConfig() { document.getElementById('configModal').classList.remove('active'); }

        function saveConfig() {
            config.apiUrl = document.getElementById('apiUrlInput').value.trim();
            localStorage.setItem('advatConfigV2', JSON.stringify(config));
            closeConfig();
            loadData();
        }

        // UTILS
        function esc(s) { return s ? String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) : ''; }

        function showTip(e, txt) {
            if (!txt || txt === '-') return;
            const t = document.getElementById('tooltip');
            t.textContent = txt;
            t.style.display = 'block';
            t.style.left = e.pageX + 10 + 'px';
            t.style.top = e.pageY + 10 + 'px';
        }

        function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));
            document.addEventListener('click', e => { 
                if (!e.target.closest('.multi-select')) document.querySelectorAll('.multi-select-dropdown').forEach(d => d.classList.remove('open')); 
            });
            document.addEventListener('keydown', e => { 
                if (e.key === 'Escape') { closeModal(); closeConfig(); document.querySelectorAll('.multi-select-dropdown').forEach(d => d.classList.remove('open')); }
            });
            document.getElementById('pdfModal').addEventListener('click', e => { if (e.target.id === 'pdfModal') closeModal(); });
            document.getElementById('configModal').addEventListener('click', e => { if (e.target.id === 'configModal') closeConfig(); });
        }

        function debounce(fn, wait) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); }; }
    </script>
</body>
</html>
